<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicofy - Tu Reproductor Musical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Preload first song for faster start -->
    <link rel="preload" as="audio" href="https://archive.org/download/nicofy/01%20REC-2025-06-04.mp3" crossorigin>
    <link rel="prefetch" as="audio" href="https://archive.org/download/nicofy/01%20REC-2025-09-17.mp3" crossorigin>
    <meta name="theme-color" content="#1db954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen text-white transition-colors duration-1000" id="mainBody">
    
    <!-- Visualizador de Audio -->
    <canvas id="visualizer" class="fixed inset-0 w-full h-full"></canvas>
    
    <!-- Header -->
    <header class="relative z-10 text-center py-6">
        <h1 class="text-4xl font-bold text-green-500 mb-1">🎵 Nicofy</h1>
        <p class="text-gray-400 text-xs">Tu música, tu reproductor</p>
    </header>

    <!-- Contenido Principal -->
    <div class="relative z-10 container mx-auto px-4 pb-12 max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            
            <!-- Columna Izquierda: Reproductor (2/3) -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Reproductor -->
                <div class="bg-gray-800/80 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-gray-700/50">
            
            <!-- Información de la canción -->
            <div class="text-center mb-6">
                <div id="albumArt" class="relative w-48 h-48 mx-auto mb-4 rounded-full bg-gradient-to-br from-gray-700 to-gray-800 flex items-center justify-center shadow-2xl bg-cover bg-center overflow-hidden transition-all duration-500 ring-4 ring-gray-800">
                    <img id="albumImg" src="" alt="Album Art" class="w-full h-full object-cover hidden">
                    <svg id="defaultAlbumIcon" class="w-20 h-20 text-white/50" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                    <!-- Cargador integrado al disco -->
                    <div id="songLoader" class="absolute inset-0 bg-black/60 flex items-center justify-center backdrop-blur-sm z-20 hidden">
                        <div class="w-12 h-12 border-4 border-green-500 border-t-transparent border-b-transparent rounded-full animate-[spin_1s_linear_infinite]"></div>
                    </div>
                </div>
                <h2 id="songTitle" class="text-xl font-semibold mb-1">Selecciona una canción</h2>
                <p id="artistName" class="text-gray-400 text-sm">--</p>
            </div>
            
            <!-- Barra de progreso -->
            <div class="mb-4">
                <div class="flex justify-between text-xs text-gray-400 mb-1">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <input type="range" id="progressBar" class="w-full h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-green-500" min="0" max="100" value="0">
            </div>
            
            <!-- Controles -->
            <div class="flex items-center justify-center gap-3 sm:gap-4">
                <button id="shuffleBtn" class="p-2 sm:p-3 rounded-full text-gray-400 hover:text-white transition-colors" title="Aleatorio">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                    </svg>
                </button>

                <button id="prevBtn" class="p-2 sm:p-3 rounded-full bg-gray-700 hover:bg-gray-600 transition-colors">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                
                <button id="playBtn" class="p-4 sm:p-5 rounded-full bg-green-500 hover:bg-green-400 focus:outline-none transition-transform hover:scale-105 active:scale-95 shadow-lg shadow-green-500/30">
                    <svg id="playIcon" class="w-6 h-6 sm:w-8 sm:h-8" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pauseIcon" class="w-6 h-6 sm:w-8 sm:h-8 hidden" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                
                <button id="nextBtn" class="p-2 sm:p-3 rounded-full bg-gray-700 hover:bg-gray-600 transition-colors">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>

                <button id="repeatBtn" class="p-2 sm:p-3 rounded-full text-gray-400 hover:text-white transition-colors" title="Repetir">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 24 24">
                        <!-- Repeat Icon -->
                        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                    </svg>
                </button>
            </div>
            
            <!-- Control de volumen -->
            <div class="flex items-center justify-center gap-2 mt-4 cursor-pointer" id="muteContainer">
                <button id="muteBtn" class="focus:outline-none">
                    <svg id="volUpIcon" class="w-5 h-5 text-gray-400 hover:text-white transition-colors" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <svg id="volMuteIcon" class="w-5 h-5 text-gray-400 hover:text-white transition-colors hidden" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                    </svg>
                </button>
                <input type="range" id="volumeBar" class="w-24 h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-green-500" min="0" max="100" value="80">
            </div>

            <!-- Controles Avanzados (V2) -->
            <div class="mt-8 pt-6 border-t border-gray-700/50">
                <div class="grid grid-cols-1 gap-6">
                    <!-- Ecualizador -->
                    <div id="eqPanel" class="transition-opacity duration-300">
                        <h4 class="text-xs uppercase text-gray-400 font-bold mb-3 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                            Ecualizador
                        </h4>
                        <div class="space-y-3">
                            <div class="flex items-center gap-2 text-xs text-gray-400">
                                <span class="w-10">Bajos</span>
                                <input type="range" id="bassEq" min="-15" max="15" value="0" class="w-full h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-green-500">
                            </div>
                            <div class="flex items-center gap-2 text-xs text-gray-400">
                                <span class="w-10">Agudos</span>
                                <input type="range" id="trebleEq" min="-15" max="15" value="0" class="w-full h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-green-500">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

                </div>
            </div>

            <!-- Columna Derecha: Playlist (1/3) -->
            <div class="lg:col-span-1 space-y-6">
                <!-- Lista de reproducción -->
                <div class="bg-gray-800/80 backdrop-blur-xl rounded-3xl p-6 shadow-2xl border border-gray-700/50 h-full">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-lg font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                        Tu Música
                    </h3>
                    <button id="refreshArchiveBtn" class="p-2 rounded-full bg-gray-700 hover:bg-gray-600 transition-colors text-xs flex items-center justify-center" 
        title="Buscar y sincronizar nuevos archivos desde tu colección archive.org" 
        aria-label="Buscar y sincronizar nuevos archivos desde archive.org">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m0 0l3.889 3.889L12 8.5l3.889-3.889M16 11.5V6a2 2 0 00-2-2h-5.5a2 2 0 00-3.898.562l-.002.003M16 11.5a4 4 0 11-7.898 3.44l-.002.002M4 16l4.898-7.898M4 16v2.5a2 2 0 002 2H9.5l.002-.002"></path></svg>
                    </button>
                </div>
                
                <div class="text-xs text-gray-400 flex items-center gap-2 bg-gray-700/50 px-2 py-1 rounded-md">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <span>Arrastra archivos MP3 aquí</span>
                </div>
            </div>
            
            <div id="dropZone" class="hidden absolute inset-0 bg-green-500/20 border-2 border-dashed border-green-500 rounded-2xl z-50 flex items-center justify-center backdrop-blur-sm transition-all text-xl font-bold">
                Soltar archivos para agregar
            </div>

            <div id="playlist" class="space-y-2 max-h-64 overflow-y-auto pr-1 pb-1">
                <!-- Las canciones se cargarán aquí -->
                <p class="text-gray-500 text-center py-4">Cargando canciones...</p>
            </div>
        </div>
        
        </div>
    </div>

    <!-- Modal Editar Metadatos -->
    <div id="editModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-gray-800 border border-gray-700 rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Editar Información
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs uppercase text-gray-400 font-bold mb-1">Título</label>
                    <input type="text" id="editTitle" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 focus:outline-none focus:border-green-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs uppercase text-gray-400 font-bold mb-1">Artista / DJ</label>
                    <input type="text" id="editArtist" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 focus:outline-none focus:border-green-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs uppercase text-gray-400 font-bold mb-1">URL de Portada (JPG/PNG)</label>
                    <input type="text" id="editImage" placeholder="https://..." class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 focus:outline-none focus:border-green-500 transition-colors">
                </div>
                <div class="flex gap-3 mt-6">
                    <button id="cancelEdit" class="flex-1 py-3 rounded-xl bg-gray-700 hover:bg-gray-600 transition-colors font-bold text-sm">Cancelar</button>
                    <button id="saveEdit" class="flex-1 py-3 rounded-xl bg-green-500 hover:bg-green-400 transition-colors font-bold text-sm text-black">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center pb-8 text-gray-500 text-xs relative z-10">
        <p>Hecho con 💚 | Nicofy v1.1 Premium</p>
    </footer>
    
    <!-- Elemento de audio oculto -->
    <audio id="audioPlayer" preload="none"></audio>
    
    <script src="app.js"></script>
</body>
</html>
