<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicofy - Premium Music</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsmediatags -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Cast SDK -->
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <style>
        @keyframes dino_run_1s_steps_infinite {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-panel:hover {
            background: rgba(15, 23, 42, 0.35);
            border-color: rgba(255, 255, 255, 0.12);
        }
        .neo-shadow {
            box-shadow: 0 20px 60px -15px rgba(0,0,0,0.8), 0 0 40px -10px rgba(74,222,128,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
        }
    </style>
</head>
<body id="mainBody" class="bg-[#0b0f19] text-white font-sans h-[100dvh] flex flex-col overflow-hidden selection:bg-green-500/30 transition-all duration-500">


    <!-- Splash Screen -->
    <div id="splashScreen" class="fixed inset-0 flex flex-col items-center justify-center bg-gradient-to-br from-[#0b0f19] via-[#111827] to-[#0a0d15] backdrop-blur-xl z-[100] transition-all duration-700">

        <div class="text-center space-y-6 relative">
            <div id="dino" class="text-6xl absolute -left-20 -top-20 z-10 transition-all duration-100 drop-shadow-xl" style="filter: drop-shadow(0 0 10px rgba(74,222,128,0.5));">🦕</div>
            <div class="relative w-32 h-32 mx-auto">
                <div class="absolute inset-0 border-t-4 border-green-500 border-solid rounded-full animate-spin shadow-[0_0_20px_rgba(34,197,94,0.3)]"></div>
                <div class="absolute inset-3 border-r-4 border-blue-500 border-solid rounded-full animate-[spin_1.5s_linear_infinite] shadow-[0_0_20px_rgba(59,130,246,0.3)]"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <svg class="w-10 h-10 text-green-400 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                </div>
            </div>
            <h3 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 tracking-tight">Cargando Bóveda</h3>
            <p class="text-gray-400 max-w-sm text-sm font-medium tracking-wide">
                Estamos preparando tu música y los módulos de ecualización de alto rendimiento.
            </p>
        </div>
    </div>

    <!-- Drag Drop Zone -->
    <div id="dropZone" class="fixed inset-0 bg-green-500/20 backdrop-blur-sm z-[300] hidden flex items-center justify-center border-4 border-dashed border-green-500 rounded-2xl m-4 pointer-events-none">
        <div class="text-white text-3xl font-bold flex flex-col items-center gap-4">
            <svg class="w-20 h-20 animate-bounce" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <div>Suelta los MP3 aquí</div>
        </div>
    </div>

    <!-- Visualizador de Fondo -->
    <canvas id="visualizer" class="fixed inset-0 w-full h-full opacity-30 mix-blend-screen pointer-events-none z-0"></canvas>

    <!-- Main Layout -->
    <div class="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden relative z-10 custom-scrollbar">
        <!-- Hero Section (Left/Center) -->
        <main class="lg:flex-1 shrink-0 flex flex-col items-center justify-center p-6 relative min-h-[60vh] lg:min-h-0">
            <div class="w-full max-w-2xl text-center flex flex-col items-center relative group">
                <!-- Cover Art -->
                <div id="albumArt" class="relative w-64 h-64 sm:w-[400px] sm:h-[400px] rounded-3xl bg-gray-900/60 flex items-center justify-center overflow-hidden transition-all duration-700 mx-auto" style="box-shadow: 0 30px 60px -20px rgba(74,222,128,0.5), 0 0 40px -10px rgba(59,130,246,0.2), inset -2px -2px 10px rgba(0,0,0,0.3), inset 2px 2px 10px rgba(255,255,255,0.1);">
                    <img id="albumImg" src="" alt="Album Art" class="w-full h-full object-cover hidden scale-105 group-hover:scale-110 transition-transform duration-700">
                    <svg id="defaultAlbumIcon" class="w-24 h-24 text-gray-700 drop-shadow-2xl" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                    
                    <!-- Spinner Buffering inside Art -->
                    <div id="songLoader" class="absolute inset-0 bg-black/50 flex items-center justify-center backdrop-blur-md z-20 hidden">
                        <div class="w-16 h-16 border-4 border-green-500 border-t-transparent border-b-transparent rounded-full animate-spin"></div>
                    </div>
                </div>

                <!-- Titles -->
                <div class="mt-10 space-y-2 w-full px-4">
                    <h2 id="songTitle" class="text-4xl sm:text-5xl font-extrabold text-white truncate drop-shadow-xl tracking-tight">Nicofy Player</h2>
                    <p id="artistName" class="text-xl text-green-400 font-semibold tracking-wide truncate">Selecciona un set musical</p>
                </div>
            </div>
        </main>

        <!-- Right Panel: Playlist -->
        <aside class="w-full sm:w-[450px] lg:w-[400px] mx-auto lg:mx-0 glass-panel border-t lg:border-t-0 lg:border-l border-white/10 flex flex-col shrink-0 z-20 min-h-[60vh] lg:min-h-0 shadow-[-20px_0_40px_rgba(74,222,128,0.1),inset_-2px_0_8px_rgba(0,0,0,0.2)]">
            <!-- Header -->
            <div class="p-6 border-b border-white/5 flex items-center justify-between bg-black/30">
                <h3 class="font-bold text-xl tracking-tight flex items-center gap-2 text-white">
                    <svg class="w-6 h-6 text-green-500" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/>
                    </svg>
                    Tu Bóveda
                </h3>
                <div class="flex items-center gap-2">
                    <button id="exportBtn" class="p-2.5 rounded-xl bg-white/5 hover:bg-blue-500/20 text-gray-300 hover:text-blue-400 transition-all group" title="Exportar metadata.json">
                        <svg class="w-5 h-5 group-hover:-translate-y-1 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </button>
                    <button id="refreshArchiveBtn" class="p-2.5 rounded-xl bg-white/5 hover:bg-green-500/20 text-gray-300 hover:text-green-400 transition-all group" title="Sincronizar Archive.org">
                        <svg class="w-5 h-5 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m0 0l3.889 3.889L12 8.5l3.889-3.889M16 11.5V6a2 2 0 00-2-2h-5.5a2 2 0 00-3.898.562l-.002.003M16 11.5a4 4 0 11-7.898 3.44l-.002.002M4 16l4.898-7.898M4 16v2.5a2 2 0 002 2H9.5l.002-.002"></path></svg>
                    </button>
                    <!-- Cast -->
                    <button id="castBtn" class="p-2.5 rounded-xl bg-white/5 hover:bg-white/10 text-gray-300 transition-all">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8 11c-2.8 0-5 2.2-5 5h2c0-1.6 1.2-3 3-3s3 1.4 3 3h2c0-2.8-2.2-5-5-5zm9-4H8V7h14v4z"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- List -->
            <div id="playlist" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
                <!-- Se inyectan las canciones -->
            </div>
        </aside>
    </div>

    <!-- Bottom Player Bar -->
    <div class="relative z-50 glass-panel border-t border-white/10 px-4 pt-4 pb-8 sm:px-6 sm:py-6 shrink-0 flex flex-col shadow-[0_-30px_60px_rgba(0,0,0,0.6),0_-0px_40px_rgba(74,222,128,0.1)]">
        <!-- Progress Bar -->
        <div class="flex items-center gap-4 mb-5 text-sm font-semibold">
            <span id="currentTime" class="w-12 text-right tabular-nums tracking-wider text-gray-300">0:00</span>
            <input type="range" id="progressBar" class="flex-1 h-2 bg-gray-800 rounded-full appearance-none cursor-pointer accent-green-500 hover:accent-green-400 transition-all shadow-[inset_0_1px_3px_rgba(0,0,0,0.6)]" value="0">
            <span id="duration" class="w-12 tabular-nums tracking-wider text-gray-500">0:00</span>
        </div>

        <!-- Controls Row -->
        <div class="flex items-center justify-between">
            <!-- Left: EQ Settings -->
            <div class="hidden sm:flex items-center gap-6 w-1/3 pr-4">
                <div id="eqPanel" class="flex items-center gap-5 w-full transition-opacity duration-300">
                    <div class="flex flex-col gap-1 w-full max-w-[120px]">
                        <span class="text-[10px] font-black tracking-widest uppercase text-gray-500 leading-none">Bajos</span>
                        <input type="range" id="bassEq" min="-15" max="15" value="0" class="w-full h-1.5 bg-gray-700 rounded-full appearance-none cursor-pointer accent-green-500">
                    </div>
                    <div class="flex flex-col gap-1 w-full max-w-[120px]">
                        <span class="text-[10px] font-black tracking-widest uppercase text-gray-500 leading-none">Agudos</span>
                        <input type="range" id="trebleEq" min="-15" max="15" value="0" class="w-full h-1.5 bg-gray-700 rounded-full appearance-none cursor-pointer accent-green-500">
                    </div>
                </div>
            </div>

            <!-- Center: Playback -->
            <div class="flex items-center justify-center gap-6 w-full sm:w-1/3">
                <button id="shuffleBtn" class="text-gray-500 hover:text-white transition-colors p-2 hidden sm:block">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                </button>
                <button id="repeatBtn" class="text-gray-500 hover:text-white transition-colors p-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <button id="prevBtn" class="text-gray-400 hover:text-white transition-transform hover:scale-110 p-2">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="playBtn" class="w-16 h-16 rounded-full bg-green-500 text-black hover:bg-green-400 hover:scale-105 active:scale-95 transition-all flex items-center justify-center" style="box-shadow: 0 0 30px rgba(74,222,128,0.6), inset 0 2px 8px rgba(255,255,255,0.2);">
                    <svg id="playIcon" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="nextBtn" class="text-gray-400 hover:text-white transition-transform hover:scale-110 p-2">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
                <!-- Mobile only mute -->
                <button class="text-gray-500 hover:text-white transition-colors p-2 sm:hidden m-0" onclick="toggleMute()">
                    <svg id="volUpIconMobile" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.898a9 9 0 010 12.728M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>

            <!-- Right: Volume -->
            <div class="hidden sm:flex items-center justify-end gap-3 w-1/3 pl-4">
                <button id="muteBtn" class="text-gray-400 hover:text-white transition-colors p-2" onclick="toggleMute()">
                    <svg id="volUpIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.898a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                    <svg id="volMuteIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15zM17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
                </button>
                <input type="range" id="volumeBar" class="w-28 h-1.5 bg-gray-700 rounded-full appearance-none cursor-pointer accent-green-500" min="0" max="100" value="80">
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-black/80 backdrop-blur-xl hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-gray-800/90 p-8 rounded-3xl w-full max-w-sm neo-shadow border border-white/10">
            <h3 class="text-2xl font-black tracking-tight mb-6 text-white text-center">Editar Metadatos</h3>
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold tracking-widest text-gray-400 mb-2 uppercase">Título</label>
                    <input type="text" id="editTitle" class="w-full bg-black/50 text-white p-3.5 rounded-xl border border-white/10 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold tracking-widest text-gray-400 mb-2 uppercase">Artista</label>
                    <input type="text" id="editArtist" class="w-full bg-black/50 text-white p-3.5 rounded-xl border border-white/10 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold tracking-widest text-gray-400 mb-2 uppercase">Banner (URL)</label>
                    <input type="text" id="editImage" class="w-full bg-black/50 text-white p-3.5 rounded-xl border border-white/10 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all" placeholder="https://...">
                </div>
            </div>
            <div class="mt-8 flex gap-4">
                <button id="cancelEdit" class="flex-1 py-3.5 px-4 rounded-xl bg-gray-700 hover:bg-gray-600 text-white transition-colors font-bold tracking-wide">Cancelar</button>
                <button id="saveEdit" class="flex-1 py-3.5 px-4 rounded-xl bg-green-500 hover:bg-green-400 text-black shadow-[0_0_15px_rgba(74,222,128,0.4)] transition-all font-bold tracking-wide">Guardar</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="none"></audio>
    <script src="app.js"></script>
</body>
</html>
